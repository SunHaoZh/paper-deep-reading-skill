<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420" role="img" aria-label="Synthetic property trend plot">
  <rect width="900" height="420" fill="#f8fafc"/>
  <text x="40" y="44" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">Figure 2. Conductivity retention trend</text>
  <g transform="translate(70 80)">
    <rect x="0" y="0" width="500" height="280" fill="#ffffff" stroke="#cbd5e1"/>
    <line x1="60" y1="230" x2="460" y2="230" stroke="#334155" stroke-width="2"/>
    <line x1="60" y1="40" x2="60" y2="230" stroke="#334155" stroke-width="2"/>
    <text x="190" y="270" font-family="Arial, sans-serif" font-size="16" fill="#334155">Thermal cycle number</text>
    <text x="-6" y="36" font-family="Arial, sans-serif" font-size="16" fill="#334155" transform="rotate(-90 -6 36)">Retention</text>
    <polyline points="60,60 140,88 220,122 300,160 380,194 460,220" fill="none" stroke="#ef4444" stroke-width="5"/>
    <polyline points="60,60 140,70 220,82 300,92 380,105 460,116" fill="none" stroke="#2563eb" stroke-width="5"/>
    <g fill="#ef4444"><circle cx="60" cy="60" r="6"/><circle cx="140" cy="88" r="6"/><circle cx="220" cy="122" r="6"/><circle cx="300" cy="160" r="6"/><circle cx="380" cy="194" r="6"/><circle cx="460" cy="220" r="6"/></g>
    <g fill="#2563eb"><circle cx="60" cy="60" r="6"/><circle cx="140" cy="70" r="6"/><circle cx="220" cy="82" r="6"/><circle cx="300" cy="92" r="6"/><circle cx="380" cy="105" r="6"/><circle cx="460" cy="116" r="6"/></g>
    <text x="330" y="95" font-family="Arial, sans-serif" font-size="15" fill="#2563eb">Layered</text>
    <text x="330" y="205" font-family="Arial, sans-serif" font-size="15" fill="#ef4444">Random</text>
  </g>
  <g transform="translate(640 100)">
    <rect x="0" y="0" width="190" height="240" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="18" y="34" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#1f2937">Final retention</text>
    <rect x="45" y="98" width="38" height="110" fill="#ef4444"/>
    <rect x="112" y="58" width="38" height="150" fill="#2563eb"/>
    <line x1="26" y1="208" x2="170" y2="208" stroke="#334155"/>
    <text x="32" y="228" font-family="Arial, sans-serif" font-size="12" fill="#475569">Random</text>
    <text x="103" y="228" font-family="Arial, sans-serif" font-size="12" fill="#475569">Layered</text>
  </g>
</svg>
