name: Validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate skill package
        run: python paper-deep-reading/scripts/validate_skill_package.py paper-deep-reading
      - name: Validate example note
        run: python paper-deep-reading/scripts/validate_note_structure.py examples/example-output/example-paper-deep-reading.md
      - name: Validate showcase note
        run: python paper-deep-reading/scripts/validate_note_structure.py examples/example-output/mini-materials-paper-deep-reading.md
